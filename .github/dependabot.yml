version: 2
updates:
  # npm dependencies - vulnerability alerts only, no update PRs
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 0
    labels:
      - "dependencies"
      - "manual-review-required"

  # GitHub Actions dependencies - vulnerability alerts only, no update PRs
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 0
    labels:
      - "dependencies"
      - "manual-review-required"
